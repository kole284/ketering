openapi: 3.1.0
info:
  title: KeteringGo API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /cities:
    get:
      summary: List cities
      responses:
        "200":
          description: Cities
  /restaurants:
    get:
      summary: List restaurants
      parameters:
        - name: city
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [rating_desc, name_asc] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Restaurants
        "422":
          $ref: "#/components/responses/Error"
  /restaurants/{id}:
    get:
      summary: Get restaurant details
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Restaurant details
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /restaurants/{id}/products:
    get:
      summary: List restaurant products
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Products
        "404":
          $ref: "#/components/responses/Error"
  /restaurants/{id}/availability:
    get:
      summary: Get restaurant availability
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Availability
        "404":
          $ref: "#/components/responses/Error"
  /orders:
    post:
      summary: Create order
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            minLength: 8
            maxLength: 200
            pattern: "^[A-Za-z0-9._:-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
        "200":
          description: Idempotent replay
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /orders/{id}:
    get:
      summary: Get order with access token
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: X-Order-Access-Token
          in: header
          required: true
          schema: { type: string, minLength: 32 }
      responses:
        "200":
          description: Order details
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
  responses:
    Error:
      description: API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
  schemas:
    ApiErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    CreateOrderRequest:
      type: object
      required:
        - restaurantId
        - customerName
        - customerEmail
        - customerPhone
        - eventAddress
        - eventDate
        - eventTime
        - items
      properties:
        restaurantId: { type: integer, minimum: 1 }
        customerName: { type: string, minLength: 2 }
        customerEmail: { type: string, format: email }
        customerPhone: { type: string }
        eventAddress: { type: string, minLength: 5 }
        eventDate:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        eventTime:
          type: string
          pattern: "^(?:[01]\\d|2[0-3]):[0-5]\\d$"
        note: { type: string, maxLength: 500 }
        sendSms: { type: boolean, default: true }
        sendEmail: { type: boolean, default: true }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId: { type: integer, minimum: 1 }
              quantity: { type: integer, minimum: 1 }
